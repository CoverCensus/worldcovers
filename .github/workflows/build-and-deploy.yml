# On push to staging: build frontend and optionally deploy.
# The built frontend (frontend/dist/) is produced so your server or deploy step can use it.
name: Build and deploy

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      # `migrate --check` was the original step here, but it needs a live
      # MySQL to inspect django_migrations and CI doesn't provide one, so it
      # was wrapped in `|| true` and silently masked every failure (model
      # import errors, broken migrations, missing dependencies all slipped
      # through). `manage.py check` is the right CI smoke test: it loads
      # settings, validates models / URL conf / app registry, and runs
      # without a DB connection. Failures here now break the build.
      # If you want a real `migrate --check` against a live DB in CI, add a
      # MySQL service block + DATABASE config; see the `services:` pattern
      # in https://docs.github.com/en/actions/using-containerized-services.
      - name: Django system checks
        run: python backend/manage.py check

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server (SSH)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: hellowoco.app
          username: jlogan
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            # Stop app so migrations can run without table locks (ALTER TABLE on Postmarks can block otherwise)
            sudo systemctl stop worldcovers
            # Sync unit file if it has changed (must run as privileged user, before wocod block)
            sudo -u wocod git -C /srv/woco fetch origin
            sudo -u wocod git -C /srv/woco reset --hard origin/staging
            if ! diff -q /srv/woco/tools/worldcovers.service /etc/systemd/system/worldcovers.service > /dev/null 2>&1; then
                echo "Updating systemd unit file..."
                sudo install -m 644 /srv/woco/tools/worldcovers.service /etc/systemd/system/worldcovers.service
                sudo systemctl daemon-reload
            fi
            # Ensure wocod can delete and recreate frontend/dist (fixes EACCES during vite build)
            sudo chown -R wocod:wocod /srv/woco/frontend/dist 2>/dev/null || true
            sudo -u wocod -s bash -lc "cd /srv/woco && ./tools/deploy.sh"
            sudo systemctl start worldcovers
